<!DOCTYPE html>
<html>
<head>
    <title>SonoLearning</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>SonoLearning</h1>

   <nav>
<a href="#" id="home-link">Home</a>
<a href="#" id="learn-link">Learn</a>
<a href="#" id="quiz-link">Quiz</a> 
<a href="#" id="about-link">About</a>
</nav>
</header>
<main>

  <div class="left-panel">

    <h2>Body Diagram</h2>

<img src="Images/Body diagram.png" alt="Body Diagram">
</div>

<div class="center-panel">

<div class="ultrasound-screen" id="ultrasound-screen">
    <img src="Images/probe.png" class="probe-image">

    <p class="scan-message">
        Select Organ To Start Scanning
    </p>
</div>

<button id="reset-btn">Reset Scan</button>

<h2>Choose an Organ</h2>

<button id="lungs-btn">Lungs</button>
<button id="heart-btn">Heart</button>
<button id="liver-btn">Liver</button>
<button id="kidneys-btn">Kidneys</button>
<button id="thyroid-btn">Thyroid</button>
<button id="uterus-btn">Uterus</button>
<button id="gallbladder-btn">Gallbladder</button>
</div>
<div class="right-panel" id="info-panel">
   
<h2>Organ Information</h2>
    <p>Click an organ to learn more.</p>

</div>
</main>
<script src="script.js"></script>
<footer>
    <p>© 2026 SonoLearning | Created by Rodaina Mansour</p>
</footer>
</body>
</html>
